services:
  - type: web
    name: antidote-mission-v3
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_KEYS_ROTATION
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: RATE_LIMIT_MAX
        value: 30
      - key: LOG_LEVEL
        value: info
    healthCheckPath: /health
    autoDeploy: true
